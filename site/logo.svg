<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" role="img" aria-labelledby="title desc">
  <title id="title">SciTriage logo</title>
  <desc id="desc">A research trace flowing through a diagnostic gate into a verified claim.</desc>
  <defs>
    <linearGradient id="gate" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#12B886"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="960" height="240" rx="36" fill="#F8FAFC"/>
  <g transform="translate(54 42)" filter="url(#soft)">
    <rect x="0" y="0" width="156" height="156" rx="30" fill="#0F172A"/>
    <path d="M34 78h38" stroke="#94A3B8" stroke-width="12" stroke-linecap="round"/>
    <path d="M84 40v76" stroke="url(#gate)" stroke-width="14" stroke-linecap="round"/>
    <path d="M84 40l44 38-44 38" fill="none" stroke="url(#gate)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="34" cy="78" r="11" fill="#F59E0B"/>
    <circle cx="128" cy="78" r="11" fill="#22C55E"/>
  </g>
  <g transform="translate(250 70)">
    <text x="0" y="54" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800" fill="#0F172A">SciTriage</text>
    <text x="2" y="102" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500" fill="#475569">Evidence gates for AutoResearch agents</text>
  </g>
</svg>
